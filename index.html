<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - GitHub Issues Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center h-screen">

<div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-md border border-gray-200">

<div class="text-center mb-8">
<img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-16 mx-auto mb-4">
<h1 class="text-3xl font-bold text-gray-800">Sign In</h1>
<p class="text-gray-500 mt-2">GitHub Issues Tracker System</p>
</div>

<form id="loginForm" class="space-y-5">

<div>
<label class="block text-sm font-semibold text-gray-700">Username</label>
<input type="text" id="username"
class="w-full border border-gray-300 p-3 rounded-lg mt-1"
placeholder="Enter username" required>
</div>

<div>
<label class="block text-sm font-semibold text-gray-700">Password</label>
<input type="password" id="password"
class="w-full border border-gray-300 p-3 rounded-lg mt-1"
placeholder="Enter password" required>
</div>

<button type="submit"
class="w-full bg-black text-white py-3 rounded-lg font-bold">
Sign In
</button>

</form>

<div class="mt-7 p-4 bg-blue-50 border border-blue-100 rounded-lg">
<p class="text-sm text-blue-800 font-medium text-center">
Demo Credential:<br>
<b>admin</b> / <b>admin123</b>
</p>
</div>

</div>

<script src="script/script.js"></script>

</body>
</html>
