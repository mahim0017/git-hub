<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab {
            border-bottom: 3px solid #000;
            color: #000;
            font-weight: 700;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b sticky top-0 z-10 p-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-8" alt="Logo">
                <span class="text-xl font-bold tracking-tight">GitHub Tracker</span>
            </div>
            <div class="flex w-full md:w-auto gap-2">
                <input type="text" id="searchInput" placeholder="Search issues..." class="flex-grow md:w-80 border p-2 px-4 rounded-full bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-300">
                <button onclick="handleSearch()" class="bg-black text-white px-6 py-2 rounded-full font-medium hover:bg-gray-800">Search</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 mt-4">
        <div class="flex gap-8 border-b border-gray-200 mb-8 text-gray-500 overflow-x-auto">
            <button onclick="filterIssues('all', this)" class="pb-3 active-tab transition-all">All</button>
            <button onclick="filterIssues('open', this)" class="pb-3 hover:text-black transition-all">Open</button>
            <button onclick="filterIssues('closed', this)" class="pb-3 hover:text-black transition-all">Closed</button>
        </div>

        <div id="summarySection" class="bg-white p-6 rounded-xl border border-gray-200 mb-8 flex flex-col md:flex-row justify-between items-center shadow-sm">
            <div class="flex items-center gap-4">
                <div class="bg-purple-100 p-3 rounded-full">
                    <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-6 h-6" alt="Icon">
                </div>
                <div>
                    <h2 id="issueCountDisplay" class="text-2xl font-bold text-gray-800">0 Issues</h2>
                    <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-6 mt-4 md:mt-0">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-green-500"></span>
                    <span class="text-sm font-semibold text-gray-700">Open</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-purple-600"></span>
                    <span class="text-sm font-semibold text-gray-700">Closed</span>
                </div>
            </div>
        </div>

        <div id="loader" class="hidden flex flex-col items-center justify-center my-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black"></div>
            <p class="mt-4 text-gray-600">Loading issues...</p>
        </div>

        <div id="issueContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="issueModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl max-w-2xl w-full p-8 relative shadow-2xl scale-in-center">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-black text-2xl">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script/script.js"></script>
</body>
</html>
